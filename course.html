    <section class="panel diagnostic" id="diagnostic"><div class="diagnostic-intro"><p class="eyebrow">12-QUESTION CHECK</p><h2>用十分钟确定起点。</h2><p>诊断只用于推荐学习阶段，不代替正式成绩。</p><button class="primary" id="start-diagnostic" type="button">开始诊断</button></div><div id="diagnostic-body" hidden></div></section>
