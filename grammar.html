    <link rel="stylesheet" href="library.css" />

  <body data-library="grammar">
    <header class="library-nav">
      <a class="library-brand" href="index.html"><span class="brand-mark">D</span>Deutsch Sprint</a>
      <nav class="library-nav-links" aria-label="资料库导航">
        <a href="index.html">首页</a>
        <a href="vocab.html">词库</a>
        <a class="active" href="grammar.html">语法库</a>

        <a href="review.html">复盘</a>
        <a href="progress.html">进度</a>
      </nav>
    </header>
    <main class="library-main">
      <section class="library-hero">
        <div>
          <p class="eyebrow">Library 02 · Grammatik</p>
          <h1>语法库</h1>
          <p>117 个专题覆盖基础形态、句法、表达转换与高阶语篇。每个专题都能查看重点、易错点并进入即时自测。</p>
        </div>
        <div class="library-count" aria-live="polite">
          <strong id="library-count-number">0</strong>
          <span id="library-count-label">个语法专题</span>

      </section>
      <section class="library-toolbar" aria-label="语法库筛选">

        <label class="search-box">
          <span aria-hidden="true">⌕</span>
          <input id="library-search" type="search" placeholder="搜索语法点或易错问题" autocomplete="off" />
        </label>
      </section>
      <div class="library-results" id="library-results"><div class="empty-state">正在载入语法库…</div></div>
      <footer class="library-footer">共 117 个语法专题。基础专题含原创例句；提升专题先提供能力框架与错误检查。</footer>
    </main>
    <script src="library.js"></script>
